<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIS2 Compliance Readiness Assessment — paolocarner.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/*============================================================
  NIS2 READINESS ASSESSMENT v2
  Aesthetic: Security Operations Dashboard — dark slate,
  electric blue, sharp data typography. Authoritative but
  approachable. IBM Plex family throughout.
============================================================*/

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0a0e1a;
  --bg-2:       #0f1526;
  --bg-card:    #131a2e;
  --bg-card-2:  #1a2240;
  --border:     #1e2d4a;
  --border-l:   #2a3d5e;
  --blue:       #3b82f6;
  --blue-l:     #60a5fa;
  --blue-glow:  rgba(59,130,246,0.12);
  --blue-glow2: rgba(59,130,246,0.06);
  --teal:       #14b8a6;
  --text:       #e2e8f4;
  --text-mid:   #94a3b8;
  --text-dim:   #4a5568;
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,0.08);
  --amber:      #fbbf24;
  --amber-bg:   rgba(251,191,36,0.08);
  --green:      #34d399;
  --green-bg:   rgba(52,211,153,0.08);
  --score-crit: #f87171;
  --score-dev:  #fbbf24;
  --score-prog: #60a5fa;
  --score-adv:  #34d399;
  --serif:      'IBM Plex Serif', Georgia, serif;
  --sans:       'IBM Plex Sans', sans-serif;
  --mono:       'IBM Plex Mono', monospace;
  --r:          10px;
  --r-sm:       6px;
  --r-xs:       4px;
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Ambient background glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 20%, rgba(59,130,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%, rgba(20,184,166,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative;
  z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

/* ---- HEADER ---- */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
}

.brand {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.brand-icon {
  width: 32px; height: 32px;
  background: var(--blue);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.brand-icon svg { width: 17px; height: 17px; }

.brand-name {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-mid);
}

.version-tag {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--blue);
  background: var(--blue-glow);
  border: 1px solid rgba(59,130,246,0.2);
  padding: 0.2rem 0.55rem;
  border-radius: 999px;
  letter-spacing: 0.05em;
}

/* ---- PHASE INDICATOR ---- */
.phase-bar {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 1.75rem;
}

.phase-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.phase-track {
  height: 3px;
  border-radius: 99px;
  background: var(--border);
  overflow: hidden;
  position: relative;
}

.phase-fill {
  position: absolute;
  inset: 0;
  background: var(--blue);
  border-radius: 99px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}

.phase-fill.active { transform: scaleX(1); }
.phase-fill.partial { transform: scaleX(0.5); }

.phase-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.phase-label.active { color: var(--blue); }

/* ---- PROGRESS ---- */
.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.5rem;
}

.progress-title {
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-mid);
}

.progress-frac {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-dim);
}

.progress-track-main {
  height: 2px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 1.75rem;
}

.progress-fill-main {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--teal));
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* ---- CARD ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 2rem 2rem 1.75rem;
  position: relative;
  overflow: hidden;
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1) both;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--blue) 0%, transparent 60%);
  opacity: 0.5;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-meta {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--blue);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.55rem;
}

.q-title {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 0.4rem;
  letter-spacing: -0.01em;
}

.q-desc {
  font-size: 0.84rem;
  color: var(--text-mid);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.art-ref {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-family: var(--mono);
  font-size: 0.63rem;
  color: var(--teal);
  background: rgba(20,184,166,0.08);
  border: 1px solid rgba(20,184,166,0.15);
  padding: 0.15rem 0.5rem;
  border-radius: 99px;
  margin-bottom: 1.25rem;
  display: block;
  width: fit-content;
}

/* ---- SELECT ---- */
.styled-select-wrap { position: relative; margin-bottom: 1.5rem; }

.styled-select {
  width: 100%;
  appearance: none;
  background: var(--bg-2);
  border: 1px solid var(--border-l);
  border-radius: var(--r-sm);
  padding: 0.8rem 2.5rem 0.8rem 1rem;
  font-family: var(--sans);
  font-size: 0.92rem;
  color: var(--text);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.styled-select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}

.styled-select option, .styled-select optgroup { background: var(--bg-card); }

.styled-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 1rem; top: 50%;
  transform: translateY(-50%);
  color: var(--blue); font-size: 0.75rem;
  pointer-events: none;
}

.field-err {
  font-size: 0.74rem;
  color: var(--red);
  margin-top: -1rem;
  margin-bottom: 0.75rem;
  display: none;
}

.field-err.show { display: block; }

/* ---- OPTION CARDS (radio) ---- */
.opt-grid {
  display: grid;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.opt-grid.two { grid-template-columns: 1fr 1fr; }
.opt-grid.three { grid-template-columns: 1fr 1fr 1fr; }

.opt-card {
  position: relative;
  cursor: pointer;
}

.opt-card input[type="radio"] {
  position: absolute; opacity: 0; width: 0; height: 0;
}

.opt-label {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  padding: 0.85rem 0.9rem;
  border: 1px solid var(--border-l);
  border-radius: var(--r-sm);
  background: var(--bg-2);
  font-size: 0.87rem;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.3;
}

.opt-label .opt-sub {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--text-dim);
  line-height: 1.4;
}

.opt-card input:checked + .opt-label {
  border-color: var(--blue);
  background: var(--blue-glow);
  color: var(--text);
}

.opt-card input:checked + .opt-label .opt-sub { color: var(--text-mid); }

.opt-label:hover {
  border-color: var(--blue);
  color: var(--text);
}

/* Score indicators on posture options */
.opt-score {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 0.35rem;
  vertical-align: middle;
}

.score-0 { background: var(--red); }
.score-5 { background: var(--amber); }
.score-10 { background: var(--green); }

/* ---- EMAIL / CONSENT ---- */
.email-field {
  margin-bottom: 1rem;
}

.field-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-mid);
  margin-bottom: 0.4rem;
  display: block;
}

.text-input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border-l);
  border-radius: var(--r-sm);
  padding: 0.8rem 1rem;
  font-family: var(--sans);
  font-size: 0.92rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.text-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}

.text-input::placeholder { color: var(--text-dim); }
.text-input.err { border-color: var(--red); }

.consent-box {
  display: flex;
  gap: 0.65rem;
  align-items: flex-start;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 0.8rem 0.9rem;
  margin-bottom: 1rem;
  transition: border-color 0.2s;
}

.consent-box.err { border-color: var(--red); }

.consent-box input[type="checkbox"] {
  flex-shrink: 0;
  width: 14px; height: 14px;
  margin-top: 2px;
  accent-color: var(--blue);
  cursor: pointer;
}

.consent-box label {
  font-size: 0.78rem;
  color: var(--text-mid);
  line-height: 1.55;
  cursor: pointer;
}

.consent-box label a.privacy-link {
  color: var(--blue);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}

/* ---- NAV BUTTONS ---- */
.btn-row {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border);
  margin-top: 0.25rem;
}

.btn-next {
  flex: 1;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 0.75rem 1.5rem;
  font-family: var(--sans);
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}

.btn-next:hover {
  background: var(--blue-l);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(59,130,246,0.3);
}

.btn-back {
  background: transparent;
  border: 1px solid var(--border-l);
  border-radius: var(--r-sm);
  padding: 0.75rem 1.1rem;
  font-family: var(--sans);
  font-size: 0.88rem;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-back:hover { border-color: var(--text-mid); color: var(--text); }
.btn-back:disabled { opacity: 0; pointer-events: none; }

/* ---- PHASE TRANSITION ---- */
.phase-bridge {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 2rem;
  text-align: center;
  animation: slideUp 0.35s ease both;
}

.phase-bridge .bridge-icon {
  font-size: 2rem;
  margin-bottom: 1rem;
}

.phase-bridge h2 {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text);
}

.phase-bridge p {
  font-size: 0.87rem;
  color: var(--text-mid);
  line-height: 1.6;
  max-width: 460px;
  margin: 0 auto 1.5rem;
}

.scope-result-mini {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.4rem 1rem;
  border-radius: 999px;
  margin-bottom: 1.25rem;
}

.scope-result-mini.in-scope  { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.scope-result-mini.possibly  { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.scope-result-mini.exempt    { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.scope-result-mini.check-law { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }

/* ---- RESULT PAGE ---- */
.result-wrap { animation: slideUp 0.4s ease both; }

/* Score gauge */
.gauge-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 2rem;
  margin-bottom: 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.gauge-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: 0.4;
}

.gauge-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 1.25rem;
}

.gauge-wrap {
  position: relative;
  width: 180px;
  height: 95px;
  margin: 0 auto 1rem;
}

.gauge-svg { width: 100%; height: 100%; overflow: visible; }

.gauge-track {
  fill: none;
  stroke: var(--border-l);
  stroke-width: 10;
  stroke-linecap: round;
}

.gauge-fill {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  stroke-dasharray: 283;
  stroke-dashoffset: 283;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1),
              stroke 0.4s ease;
}

.gauge-number {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 600;
  fill: var(--text);
}

.gauge-denom {
  font-family: var(--mono);
  font-size: 0.75rem;
  fill: var(--text-dim);
}

.score-band {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.3rem 0.85rem;
  border-radius: 999px;
  margin-bottom: 0.5rem;
}

.band-critical { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
.band-developing{ background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.band-progressing{ background: var(--blue-glow); color: var(--blue-l); border: 1px solid rgba(59,130,246,0.2); }
.band-advanced  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

.gauge-desc {
  font-size: 0.82rem;
  color: var(--text-mid);
  max-width: 360px;
  margin: 0 auto;
  line-height: 1.55;
}

.self-report-note {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  margin-top: 0.75rem;
  letter-spacing: 0.03em;
}

/* Scope verdict row */
.verdict-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}

.verdict-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.25rem 1.25rem 1rem;
}

.vc-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}

.vc-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.28rem 0.7rem;
  border-radius: 999px;
  margin-bottom: 0.5rem;
}

.vc-badge.in-scope  { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
.vc-badge.possibly  { background: var(--amber-bg);  color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.vc-badge.exempt    { background: var(--green-bg);  color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.vc-badge.check-law { background: var(--amber-bg);  color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.vc-badge.law   { background: var(--green-bg);  color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.vc-badge.draft { background: var(--amber-bg);  color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.vc-badge.delay { background: var(--red-bg);    color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }

.vc-sub {
  font-size: 0.78rem;
  color: var(--text-mid);
  line-height: 1.45;
}

/* ---- GAP CHART ---- */
.gap-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.75rem 1.75rem 1.5rem;
  margin-bottom: 1rem;
}

.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.section-title {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.section-sub {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

.gap-item {
  margin-bottom: 1rem;
}

.gap-item:last-child { margin-bottom: 0; }

.gap-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.3rem;
}

.gap-name {
  font-size: 0.82rem;
  color: var(--text-mid);
  font-weight: 500;
}

.gap-score-val {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
}

.gap-bar-track {
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.gap-bar-fill {
  height: 100%;
  border-radius: 99px;
  width: 0%;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.gap-bar-fill.score-0  { background: var(--red); }
.gap-bar-fill.score-5  { background: var(--amber); }
.gap-bar-fill.score-10 { background: var(--green); }

.gap-art {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
}

/* Legend */
.gap-legend {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.72rem;
  color: var(--text-mid);
}

.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ---- RECOMMENDATIONS ---- */
.rec-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.75rem 1.75rem 1.5rem;
  margin-bottom: 1rem;
}

.rec-item {
  display: flex;
  gap: 1rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}

.rec-item:last-child { border-bottom: none; padding-bottom: 0; }
.rec-item:first-child { padding-top: 0; }

.rec-priority {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
}

.rec-priority.p-high   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }

<script>
/*=============================================================

// ---- SECURITY UTILITY ----
function escapeHtml(s) {

}

// ---- COUNTRY DATA ----
const COUNTRIES = [
  { code:"AT", name:"Austria",         status:"law",   notes:"Transposed via NISG 2024." },

// ---- POSTURE QUESTIONS (Phase 2) ----
// Each maps to one NIS2 Art. 21(2) measure.
// Answers: "none"=0, "partial"=5, "full"=10
const POSTURE_QS = [
  {
    id: "risk",
    art: "Art. 21(2)(a)",

    desc: "Do you have a documented cybersecurity risk assessment process that is reviewed regularly?",

// ---- SCOPE EVALUATION ----
function evaluateScope(a) {
  const country = COUNTRIES.find(c => c.code === a.country);
  const sector  = SECTORS.find(s => s.id === a.sector);

  const emp250    = a.employees === "250plus";
  const emp50up   = a.employees === "50plus" || emp250;
  const empUnsure = a.employees === "unsure";
  const rev50     = a.revenue === "50mplus";
  const rev10up   = a.revenue === "10mplus" || rev50;
  const revUnsure = a.revenue === "unsure";
  const isLarge   = emp250 || rev50;
  const isMedium  = !isLarge && emp50up && rev10up;
  const isUnsure  = !isLarge && !isMedium && (empUnsure || revUnsure);

  if (!sector || sector.annex === null) {
    return { state:"exempt", headline:"Sector not listed — likely not in scope",
      subline:"NIS2 applies only to Annex I/II sectors.", country, sector, isLarge, isMedium };
  }
  if (country.status === "delay") {
    return { state:"check-law", headline:"National law not yet in force",
      subline:`${country.name} had not fully transposed NIS2 as of mid-2025. Verify urgently.`,
      country, sector, isLarge, isMedium };
  }
  if (country.status === "draft") {
    if (isLarge || sector.override) {
      return { state:"possibly", headline:"Likely in scope — law imminent",
        subline:`${country.name}'s transposition bill is advanced. If enacted, you would be in scope.`,
        country, sector, isLarge, isMedium };
    }
    return { state:"check-law", headline:"Monitor — law not yet in force",
      subline:`${country.name} is transposing NIS2 but the law is not yet enacted.`,
      country, sector, isLarge, isMedium };
  }
  if (sector.override && !isLarge && !isMedium) {
    return { state:"possibly", headline:"Possible scope regardless of size",
      subline:"Art. 2(2) critical entity exception may apply. Requires legal review.",
      country, sector, isLarge, isMedium };
  }
  if (isUnsure) {
    return { state:"possibly", headline:"Possibly in scope — size unclear",
      subline:"Your sector is covered but size thresholds could not be determined.",
      country, sector, isLarge, isMedium };
  }
  if (isLarge || isMedium) {
    const sl = isLarge ? "large entity (≥250 employees or ≥€50M)" : "medium entity (≥50 employees and ≥€10M)";
    return { state:"in-scope", headline:"Yes — you are likely in scope",
      subline:`As a ${sl} in NIS2 Annex ${sector.annex}, NIS2 applies in ${country.name}.`,
      country, sector, isLarge, isMedium };
  }
  return { state:"exempt", headline:"Likely exempt — below size thresholds",
    subline:"NIS2 generally exempts micro/small entities. Verify Art. 2(2) exception.",
    country, sector, isLarge, isMedium };
}

// ---- SCORE CALCULATION ----
function computeScore(posture) {
  let total = 0;
  let answered = 0;
  POSTURE_QS.forEach(q => {
    const ans = posture[q.id];
    if (ans === "skipped" || ans === undefined) return;
    answered++;
    if (ans === "full")    total += 10;
    else if (ans === "partial") total += 5;
  });
  // If all questions were skipped, return null to signal N/A
  if (answered === 0) return null;
  // If partially answered, scale to 100 based on answered questions only
  return Math.round((total / (answered * 10)) * 100);
}

function scoreBand(score) {
  if (score <= 30) return { cls:"band-critical",    label:"Critical",    gaugeColor:"#f87171", desc:"Significant gaps exist across multiple NIS2 requirements. Immediate action is needed before supervisory engagement." };
  if (score <= 60) return { cls:"band-developing",  label:"Developing",  gaugeColor:"#fbbf24", desc:"Some controls are in place but key gaps remain. A structured remediation programme is required." };
  if (score <= 85) return { cls:"band-progressing", label:"Progressing", gaugeColor:"#60a5fa", desc:"A reasonable baseline exists with specific areas needing strengthening. Focus on closing the remaining gaps." };
  return              { cls:"band-advanced",    label:"Advanced",    gaugeColor:"#34d399", desc:"Strong posture across NIS2 requirements. Maintain through regular testing and continuous improvement." };
}

function getBarClass(ans) {
  if (ans === "full")    return "score-10";
  if (ans === "partial") return "score-5";
  return "score-0";
}

function getPriority(ans) {
  if (ans === "none")    return { cls:"p-high",   label:"High" };
  if (ans === "partial") return { cls:"p-medium", label:"Med" };
  return                        { cls:"p-low",    label:"Low" };
}

// ---- FORMSPREE SUBMISSION (internal lead capture — sends to you) ----
async function submitToFormspree(email, scopeResult, score, posture) {

    return `${q.title}: ${label} (${q.art})`;
  }).join("\n");

  const payload = {
    email,
    "Country":              country ? country.name : state.answers.country,
    "Sector":               sector  ? sector.name  : state.answers.sector,
    "Employees":            {under50:"Under 50","50plus":"50–249","250plus":"250+",unsure:"Not sure"}[state.answers.employees] || "",
    "Annual turnover":      {under10m:"Under €10M","10mplus":"€10M–€49M","50mplus":"€50M+",unsure:"Not sure"}[state.answers.revenue] || "",
    "NIS2 scope verdict":   scopeResult.headline,
    "Scope state":          scopeResult.state,
    "Readiness score":      `${score}/100 — ${band.label}`,
    "Posture by measure":   postureLines,
    "Country law status":   country ? country.status : "",
    "Consent given":        posture.consent ? "Yes" : "No",
    "Submitted at":         new Date().toISOString(),
  };

  const res = await fetch("https://formspree.io/f/mlgpjnjz", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.errors ? data.errors.map(e => e.message).join(", ") : "Formspree submission failed");
  }
  return res.json();
}

// ---- STATE ----
const state = {
  phase: 1,         // 1=scope, 1.5=bridge, 2=posture, 3=email, 4=result
  step: 0,          // global step index 0-15
  answers: {},      // all answers keyed by question id
  scopeResult: null,
  score: null,
};

const TOTAL_STEPS = 16; // 5 scope + 10 posture + 1 email

// ---- PHASE/PROGRESS UPDATE ----
function updateChrome() {
  const s = state.step;
  const pct = Math.round((s / TOTAL_STEPS) * 100);

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressFrac").textContent = pct + "%";

  if (state.phase === 4) {
    document.getElementById("progressWrap").style.display = "none";
    document.getElementById("phaseBar").style.display = "none";
    return;
  }

  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("phaseBar").style.display = "flex";

  const stepLabel = s < 16 ? `Step ${s+1} of ${TOTAL_STEPS}` : "Complete";
  document.getElementById("progressTitle").textContent = stepLabel;

  // Phase bar
  const pf1 = document.getElementById("pf1"), pl1 = document.getElementById("pl1");
  const pf2 = document.getElementById("pf2"), pl2 = document.getElementById("pl2");
  const pf3 = document.getElementById("pf3"), pl3 = document.getElementById("pl3");

  // Reset
  [pf1,pf2,pf3].forEach(f => { f.classList.remove("active","partial"); });
  [pl1,pl2,pl3].forEach(l => l.classList.remove("active"));

  if (s <= 5) {
    pf1.classList.add(s === 0 ? "partial" : "active"); pl1.classList.add("active");
  } else if (s <= 15) {
    pf1.classList.add("active");
    pf2.classList.add(s <= 6 ? "partial" : s <= 15 ? "active" : "active");
    if (s >= 6) pl2.classList.add("active");
  } else {
    pf1.classList.add("active"); pf2.classList.add("active");
    pf3.classList.add(s === 15 ? "partial" : "active");
    pl3.classList.add("active");
  }
}

// ---- RENDER ROUTER ----
function render() {
  updateChrome();
  const main = document.getElementById("main");
  main.innerHTML = "";

  if (state.phase === 1) {
    main.appendChild(buildScopeStep(state.step));
  } else if (state.phase === 1.5) {
    main.appendChild(buildBridge());
  } else if (state.phase === 2) {
    main.appendChild(buildPostureStep(state.step - 5));
  } else if (state.phase === 3) {
    main.appendChild(buildEmailStep());
  } else {
    buildResult(main);
  }
}

// ---- SCOPE STEPS (0-4) ----
const SCOPE_STEPS = [
  { id:"country",   title:"Where is your company headquartered?",
    desc:"NIS2 applies per the member state where you are established. Multi-country: select primary HQ.",
    type:"select", optionsFrom:"countries", placeholder:"Select a country…" },
  { id:"sector",    title:"Which sector does your organisation operate in?",
    desc:"NIS2 applies only to organisations in the 18 sectors listed in Annexes I and II.",
    type:"select", optionsFrom:"sectors", placeholder:"Select a sector…" },
  { id:"employees", title:"How many employees does your company have?",
    desc:"Use FTE count across the group. Micro: <10 · Small: 10–49 · Medium: 50–249 · Large: 250+",
    type:"radio",
    options:[{v:"under50",l:"Under 50"},{v:"50plus",l:"50 – 249"},{v:"250plus",l:"250 or more"},{v:"unsure",l:"Not sure"}] },
  { id:"revenue",   title:"What is your annual net turnover?",
    desc:"EU SME definition applies. Either employees OR revenue meeting the threshold triggers scope.",
    type:"radio",
    options:[{v:"under10m",l:"Under €10M"},{v:"10mplus",l:"€10M – €49M"},{v:"50mplus",l:"€50M or more"},{v:"unsure",l:"Not sure"}] },
  { id:"org_size",  title:"How would you describe your organisation?",
    desc:"This helps calibrate the depth of recommendations.",
    type:"radio",
    options:[{v:"startup",l:"Start-up",sub:"<5 years, <50 staff"},{v:"sme",l:"SME",sub:"50–249 staff"},{v:"mid",l:"Mid-market",sub:"250–999 staff"},{v:"enterprise",l:"Enterprise",sub:"1000+ staff"}] },
];

function buildScopeStep(stepIdx) {
  const s = SCOPE_STEPS[stepIdx];
  const el = document.createElement("div");
  el.className = "card";

  let h = `<div class="q-meta">Phase 1 — Scope · Question ${stepIdx+1} of 5</div>
    <h2 class="q-title">${escapeHtml(s.title)}</h2>
    <p class="q-desc">${escapeHtml(s.desc)}</p>`;

  if (s.type === "select") {
    const opts = s.optionsFrom === "countries" ? COUNTRIES : SECTORS;
    h += `<div class="styled-select-wrap">
      <select class="styled-select" id="sInput">
        <option value="">${escapeHtml(s.placeholder)}</option>`;
    if (s.optionsFrom === "countries") {
      opts.forEach(c => {
        h += `<option value="${escapeHtml(c.code)}" ${state.answers[s.id]===c.code?"selected":""}>${escapeHtml(c.name)}</option>`;
      });
    } else {
      h += `<optgroup label="Annex I — Essential Sectors">`;
      opts.filter(o=>o.annex==="I").forEach(o => {
        h += `<option value="${escapeHtml(o.id)}" ${state.answers[s.id]===o.id?"selected":""}>${escapeHtml(o.name)}</option>`;
      });
      h += `</optgroup><optgroup label="Annex II — Important Sectors">`;
      opts.filter(o=>o.annex==="II").forEach(o => {
        h += `<option value="${escapeHtml(o.id)}" ${state.answers[s.id]===o.id?"selected":""}>${escapeHtml(o.name)}</option>`;
      });
      h += `</optgroup><optgroup label="Other">`;
      opts.filter(o=>!o.annex).forEach(o => {
        h += `<option value="${escapeHtml(o.id)}" ${state.answers[s.id]===o.id?"selected":""}>${escapeHtml(o.name)}</option>`;
      });
      h += `</optgroup>`;
    }
    h += `</select></div>
    <div class="field-err" id="fErr">Please make a selection to continue.</div>`;

  } else {
    const cols = s.options.length <= 2 ? "two" : "two";
    h += `<div class="opt-grid ${cols}" id="opts">`;
    s.options.forEach(o => {
      const chk = state.answers[s.id] === o.v ? "checked" : "";
      h += `<label class="opt-card">
        <input type="radio" name="sr" value="${escapeHtml(o.v)}" ${chk}>
        <span class="opt-label">${escapeHtml(o.l)}${o.sub ? `<span class="opt-sub">${escapeHtml(o.sub)}</span>` : ""}</span>
      </label>`;
    });
    h += `</div>
    <div class="field-err" id="fErr">Please select an option to continue.</div>`;
  }

  h += `<div class="btn-row">
    <button class="btn-back" id="bBack" ${stepIdx===0?"disabled":""}>← Back</button>
    <button class="btn-next" id="bNext">Continue →</button>
  </div>`;

  el.innerHTML = h;

  // Wire back
  const backBtn = el.querySelector("#bBack");
  if (backBtn && stepIdx > 0) {
    backBtn.addEventListener("click", () => { state.step--; render(); });
  }

  // Wire next
  el.querySelector("#bNext").addEventListener("click", () => {
    if (s.type === "select") {
      const val = el.querySelector("#sInput").value;
      if (!val) { el.querySelector("#fErr").classList.add("show"); return; }
      state.answers[s.id] = val;
    } else {
      const checked = el.querySelector('input[name="sr"]:checked');
      if (!checked) { el.querySelector("#fErr").classList.add("show"); return; }
      state.answers[s.id] = checked.value;
    }
    state.step++;
    if (state.step === 5) {
      // Scope phase complete — compute scope result and show bridge
      state.scopeResult = evaluateScope(state.answers);
      state.phase = 1.5;
    }
    render();
  });

  // Auto-advance radios
  if (s.type === "radio") {
    el.querySelectorAll('input[name="sr"]').forEach(r => {
      r.addEventListener("change", () => {
        state.answers[s.id] = r.value;
        setTimeout(() => el.querySelector("#bNext").click(), 260);
      });
    });
  }

  return el;
}

// ---- BRIDGE ----
function buildBridge() {
  const r = state.scopeResult;
  const el = document.createElement("div");
  el.className = "phase-bridge";

  const stateIcons  = { "in-scope":"⚠️", "possibly":"🔍", "exempt":"✅", "check-law":"📋" };
  const stateLabels = { "in-scope":"Likely In Scope", "possibly":"Possibly In Scope", "exempt":"Likely Exempt", "check-law":"Law Status Unclear" };
  const isOptional  = r.state === "exempt" || r.state === "check-law";

  const bodyByState = {
    "in-scope":   "Now let's assess your current security posture against the 10 NIS2 Article 21(2) requirements — so we can calculate your readiness score and identify your specific gaps.",
    "possibly":   "Even where scope is uncertain, understanding your posture is valuable. Let's assess your current security controls against the 10 NIS2 Article 21(2) requirements so you are prepared if scope is confirmed.",
    "exempt":     "NIS2 does not appear to apply to your organisation — you are under no obligation to continue. That said, the posture assessment is still available if you would like to benchmark your security controls against the Article 21(2) measures. Good security practice applies regardless of regulatory scope.",
    "check-law":  "There is no immediate legal obligation while your country's transposition is pending. The posture assessment is still available — if and when the law comes into force, you may become subject to NIS2 with little notice, so it is worth knowing where you stand.",
  };

  const nextLabel = isOptional ? "Assess my posture anyway →" : "Start posture assessment →";
  const skipHtml  = isOptional
    ? `<button class="btn-secondary" id="bBridgeSkip" style="flex:0;padding:0.75rem 1.5rem;">Skip to contact →</button>`
    : "";

  el.innerHTML = `
    <div class="bridge-icon">🛡️</div>
    <div class="scope-result-mini ${escapeHtml(r.state)}">${stateIcons[r.state]} ${stateLabels[r.state]}</div>
    <h2>Scope determination complete</h2>
    <p style="margin-bottom:0.75rem;">${escapeHtml(r.subline)}</p>
    <p>${escapeHtml(bodyByState[r.state] || "")}</p>
    <div class="btn-row" style="justify-content:center;border-top:none;padding-top:1.5rem;flex-wrap:wrap;">
      <button class="btn-back" id="bBridgeBack">← Revise scope</button>
      <button class="btn-next" id="bBridgeNext" style="flex:0;padding:0.75rem 2rem;">${escapeHtml(nextLabel)}</button>
      ${skipHtml}
    </div>`;

  el.querySelector("#bBridgeBack").addEventListener("click", () => {
    state.step = 4; state.phase = 1; render();
  });

  el.querySelector("#bBridgeNext").addEventListener("click", () => {
    state.phase = 2; render();
  });

  if (isOptional) {
    el.querySelector("#bBridgeSkip").addEventListener("click", () => {
      // Fill unanswered posture questions with "skipped" so score renders as N/A rather than 0
      POSTURE_QS.forEach(q => { if (!state.answers[q.id]) state.answers[q.id] = "skipped"; });
      state.step = 15;
      state.phase = 3;
      render();
    });
  }

  return el;
}

// ---- POSTURE STEPS (step 5-14, qIdx 0-9) ----
function buildPostureStep(qIdx) {
  const q = POSTURE_QS[qIdx];
  const el = document.createElement("div");
  el.className = "card";

  const options = [
    { v:"none",    l:"Not started",  sub:"No controls in place",            scoreClass:"score-0" },
    { v:"partial", l:"Partially implemented", sub:"Some controls, gaps remain", scoreClass:"score-5" },
    { v:"full",    l:"Fully implemented", sub:"Controls in place and tested",  scoreClass:"score-10" },
  ];

  let h = `<div class="q-meta">Phase 2 — Security Posture · Control ${qIdx+1} of 10</div>
    <div class="art-ref">⚡ ${escapeHtml(q.art)}</div>
    <h2 class="q-title">${escapeHtml(q.title)}</h2>
    <p class="q-desc">${escapeHtml(q.desc)}</p>
    <div class="opt-grid three" id="opts">`;

  options.forEach(o => {
    const chk = state.answers[q.id] === o.v ? "checked" : "";
    h += `<label class="opt-card">
      <input type="radio" name="pr" value="${escapeHtml(o.v)}" ${chk}>
      <span class="opt-label">
        <span><span class="opt-score ${o.scoreClass}"></span>${escapeHtml(o.l)}</span>
        <span class="opt-sub">${escapeHtml(o.sub)}</span>
      </span>
    </label>`;
  });

  h += `</div>
    <div class="field-err" id="fErr">Please select your current status.</div>
    <div class="btn-row">
      <button class="btn-back" id="bBack">← Back</button>
      <button class="btn-next" id="bNext">${qIdx === 9 ? "Continue to final step →" : "Continue →"}</button>
    </div>`;

  el.innerHTML = h;

  el.querySelector("#bBack").addEventListener("click", () => {
    if (qIdx === 0) { state.phase = 1.5; render(); }
    else { state.step--; render(); }
  });

  el.querySelector("#bNext").addEventListener("click", () => {
    const checked = el.querySelector('input[name="pr"]:checked');
    if (!checked) { el.querySelector("#fErr").classList.add("show"); return; }
    state.answers[q.id] = checked.value;
    state.step++;
    if (state.step === 15) { state.phase = 3; }
    render();
  });

  el.querySelectorAll('input[name="pr"]').forEach(r => {
    r.addEventListener("change", () => {
      state.answers[q.id] = r.value;
      setTimeout(() => el.querySelector("#bNext").click(), 260);
    });
  });

  return el;
}

// ---- EMAIL STEP ----
function buildEmailStep() {
  const el = document.createElement("div");

  // Preview the score as a teaser — may be null if posture was skipped
  const previewScore = computeScore(state.answers);

  const scoreTeaserHtml = previewScore !== null
    ? `<div style="display:flex;align-items:center;gap:0.75rem;background:var(--bg-2);border:1px solid var(--border-l);border-radius:var(--r-sm);padding:0.85rem 1rem;margin-bottom:1.25rem;">
        <span style="font-family:var(--serif);font-size:1.6rem;font-weight:600;color:var(--text);">${previewScore}</span>
        <span style="font-family:var(--mono);font-size:0.75rem;color:var(--text-dim);">/100</span>

      </div>`
    : `<div style="background:var(--bg-2);border:1px solid var(--border-l);border-radius:var(--r-sm);padding:0.85rem 1rem;margin-bottom:1.25rem;font-size:0.84rem;color:var(--text-mid);">
        Posture assessment skipped — your scope result is ready to view.
      </div>`;

  el.innerHTML = `
    <div class="q-meta">Phase 3 — Your Results</div>
    <h2 class="q-title">Your results are ready</h2>
    <p class="q-desc">Optionally, leave your email if you'd like to be contacted about your results or receive NIS2 updates.</p>
    ${scoreTeaserHtml}
    <div style="display:flex;align-items:center;gap:0.6rem;background:rgba(20,184,166,0.06);border:1px solid rgba(20,184,166,0.18);border-radius:var(--r-sm);padding:0.7rem 0.9rem;margin-bottom:1.25rem;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--teal);flex-shrink:0;"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      <span style="font-size:0.8rem;color:var(--teal);">Your results include a link to the free <strong>NIS2 SME Toolkit</strong> on GitHub — templates and checklists to start your compliance journey.</span>
    </div>
    <div class="email-field">
      <label class="field-label" for="emailIn">Email address <span style="font-weight:400;color:var(--text-dim);font-size:0.82em;">(optional)</span></label>
      <input type="email" class="text-input" id="emailIn" placeholder="you@company.com"
             value="${escapeHtml(state.answers.email||"")}" autocomplete="email" spellcheck="false">
      <div class="field-err" id="emailErr">Please enter a valid email address.</div>
    </div>
    <div class="consent-box" id="consentBox">
      <input type="checkbox" id="consentChk" ${state.answers.consent?"checked":""}>
      <label for="consentChk">I agree to be contacted by Paolo Carner regarding NIS2 compliance.
        I have read the <a href="#" id="privacyLink" class="privacy-link">Privacy Notice</a>
        and consent to my email being used for this purpose. I can unsubscribe at any time.
      </label>
    </div>
    <div class="btn-row">
      <button class="btn-back" id="bBack">← Back</button>
      <button class="btn-next" id="bNext">View my results →</button>
    </div>`;

  // Wire privacy link
  el.querySelector("#privacyLink").addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation();
    window.open("https://www.paolocarner.com/privacy-statement", "_blank", "noopener,noreferrer");
  });

  el.querySelector("#bBack").addEventListener("click", () => {
    state.step = 14; state.phase = 2; render();
  });

  el.querySelector("#emailIn").addEventListener("keydown", e => {
    if (e.key === "Enter") el.querySelector("#bNext").click();
  });

  el.querySelector("#bNext").addEventListener("click", () => {
    const email = el.querySelector("#emailIn").value.trim();
    const consent = el.querySelector("#consentChk").checked;
    const hasEmail = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);

    if (email && !hasEmail) {
      el.querySelector("#emailIn").classList.add("err");
      el.querySelector("#emailErr").classList.add("show");
      return;
    }
    if (hasEmail && !consent) {
      el.querySelector("#consentBox").classList.add("err");
      setTimeout(() => el.querySelector("#consentBox").classList.remove("err"), 2000);
      return;
    }

    state.answers.email = hasEmail ? email : "";
    state.answers.consent = hasEmail ? consent : false;
    state.score = computeScore(state.answers);
    state.phase = 4;
    render();
  });

  return el;
}

      const barCls = getBarClass(ans);
      h += `<div class="gap-item">
        <div class="gap-row">
          <span class="gap-name">${escapeHtml(q.title)}</span>
          <span class="gap-score-val">${pts}/10</span>
        </div>
        <div class="gap-bar-track">
          <div class="gap-bar-fill ${barCls}" id="bar${i}" style="width:0%"></div>
        </div>
        <div class="gap-art">${escapeHtml(q.art)}</div>
      </div>`;
    });

    h += `</div>`;
  }

  // --- RECOMMENDATIONS (only if posture was answered) ---
  if (hasScore) {
    const sorted = POSTURE_QS
      .map(q => ({ q, ans: state.answers[q.id] || "none" }))
      .filter(({ ans }) => ans !== "full" && ans !== "skipped")
      .sort((a, b) => {
        const pts = { none: 0, partial: 5, full: 10 };
        return pts[a.ans] - pts[b.ans];
      });

    if (sorted.length > 0) {
      h += `<div class="rec-section">
        <div class="section-header">
          <span class="section-title">Personalised Recommendations</span>
          <span class="section-sub">${sorted.length} action${sorted.length>1?"s":""}</span>
        </div>`;

      sorted.forEach(({ q, ans }, i) => {
        const p = getPriority(ans);
        h += `<div class="rec-item">
          <div class="rec-priority ${p.cls}">${p.label}</div>
          <div class="rec-body">
            <div class="rec-title">${escapeHtml(q.rec_title)}</div>
            <div class="rec-desc">${escapeHtml(q.rec_desc)}</div>
            <span class="rec-tag">${escapeHtml(q.art)}</span>
          </div>
        </div>`;
      });

      h += `</div>`;
    } else {
      h += `<div class="rec-section" style="text-align:center;padding:2rem;">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">🏆</div>
        <div style="font-family:var(--serif);font-size:1rem;color:var(--text);margin-bottom:0.35rem;">Excellent posture reported</div>
        <div style="font-size:0.82rem;color:var(--text-mid);">All 10 NIS2 Article 21(2) controls reported as fully implemented. Maintain through regular testing and continuous improvement.</div>
      </div>`;
    }
  }

  // --- FREE TOOLKIT LINK ---
  h += `<div class="toolkit-card" id="toolkitCard">
    <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.6rem;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--teal);flex-shrink:0;"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      <span style="font-family:var(--mono);font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal);">Free resource</span>
    </div>
    <div style="font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.35rem;">NIS2 SME Toolkit</div>
    <p style="font-size:0.82rem;color:var(--text-mid);line-height:1.6;margin-bottom:1rem;">A free, open-source starting point for your NIS2 compliance journey — templates, checklists, and guidance aligned with the recommendations above.</p>
    <button class="btn-toolkit" id="toolkitBtn">View on GitHub →</button>
  </div>`;

  // --- CTA (for in-scope / possibly) ---
  if (sr.state === "in-scope" || sr.state === "possibly") {
    h += `<div class="cta-section">
      <div class="cta-eyebrow">Next step</div>
      <div class="cta-title">Get your full NIS2 Readiness Assessment</div>
      <div class="cta-desc">Turn this self-assessment into a board-ready gap analysis with evidence-based findings, a prioritised remediation roadmap, and a complete Information Security Policy framework — delivered in 5 business days.</div>
      <div class="cta-includes">
        <span class="cta-tag">Scope determination</span>
        <span class="cta-tag">Gap analysis vs Art. 21(2)</span>
        <span class="cta-tag">Board-ready report</span>
        <span class="cta-tag">Policy framework</span>
        <span class="cta-tag">Remediation roadmap</span>
      </div>
      <div class="cta-bottom">
        <div class="cta-price">€1,500 <span>fixed fee · 5 business days</span></div>
        <button class="btn-cta" id="ctaBtn">Book a 30-min call →</button>
      </div>
    </div>`;
  }

  // --- EMAIL STATUS ---
  h += `<div class="email-status" id="emailStatus"></div>`;

  // --- DISCLAIMER ---
  h += `<div class="disclaimer">
    <strong>Important:</strong> This assessment is a self-reported screening tool only — it is <strong>not legal advice</strong> and does not constitute a certified compliance determination. Scores are based on your own inputs and should be validated through independent audit. NIS2 transposition status is indicative as of mid-2025 and may have changed. Always engage qualified legal and compliance professionals before acting on these results.
  </div>
  <button class="restart-btn" id="restartBtn">↩ Start a new assessment</button>
  </div>`;

  container.innerHTML = h;

  // ---- POST-INJECTION WIRING ----

  // Animate gauge (only if score exists)
  if (hasScore) {
    setTimeout(() => {
      const fill = document.getElementById("gaugeFill");
      const numEl = document.getElementById("gaugeNum");
      if (fill) {
        const target = circumference - (score / 100) * circumference;
        fill.style.strokeDashoffset = target;
      }
      if (numEl) {
        let current = 0;
        const duration = 1200;
        const interval = 16;
        const steps = duration / interval;
        const increment = score / steps;
        const counter = setInterval(() => {
          current = Math.min(current + increment, score);
          numEl.textContent = Math.round(current);
          if (current >= score) clearInterval(counter);
        }, interval);
      }
    }, 100);

    // Animate gap bars
    setTimeout(() => {
      POSTURE_QS.forEach((q, i) => {
        const ans = state.answers[q.id] || "none";
        const pts = ans === "full" ? 10 : ans === "partial" ? 5 : 0;
        const pct = (pts / 10) * 100;
        const bar = document.getElementById(`bar${i}`);
        if (bar) setTimeout(() => { bar.style.width = pct + "%"; }, i * 80);
      });
    }, 200);
  }

  // Toolkit button
  const toolkitBtn = document.getElementById("toolkitBtn");
  if (toolkitBtn) {
    toolkitBtn.addEventListener("click", () => {
      window.open("https://github.com/paolocarner/nis2-sme-toolkit", "_blank", "noopener,noreferrer");
    });
  }

  // CTA button
  const ctaBtn = document.getElementById("ctaBtn");
  if (ctaBtn) {
    ctaBtn.addEventListener("click", () => {
      window.open("https://calendly.com/paolo-carner-bare-consult/30min", "_blank", "noopener,noreferrer");
    });
  }

  // Restart
  document.getElementById("restartBtn").addEventListener("click", () => {
    state.phase = 1; state.step = 0; state.answers = {};
    state.scopeResult = null; state.score = null;
    render();
  });

  // Formspree: silent internal lead capture — customer never sees this
  submitToFormspree(state.answers.email, sr, score, state.answers).catch(err => {
    console.warn("Formspree lead capture failed:", err.message);
  });

  // Static contact nudge — shown once the result page renders
  const statusEl = document.getElementById("emailStatus");
  if (statusEl) {
    statusEl.innerHTML = `<div class="email-sent-bar" style="align-items:flex-start;flex-direction:column;gap:0.35rem;">
      <span style="font-weight:600;color:var(--green);">Questions about your results?</span>
      <span>Write to us at <a href="mailto:info@paolocarner.com" style="color:var(--green);text-decoration:underline;text-underline-offset:2px;">info@paolocarner.com</a> — we typically reply within one business day.</span>
    </div>`;
  }

  container.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ---- INIT ----
render();
</script>
</body>
</html>
